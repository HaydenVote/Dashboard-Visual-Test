<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAO Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root{--purple-900:#1E0A3C;--purple-800:#2D1160;--purple-600:#461D7C;--purple-500:#5B2D9E;--purple-400:#7B52B5;--purple-200:#C5ADE0;--purple-100:#E8DCF5;--purple-50:#F5F0FA;--gold-500:#FDD023;--gold-400:#FDDA52;--gold-300:#FDE481;--gold-100:#FFF8DF;--gold-600:#D4A90A;--sidebar-w:260px;--header-h:64px;--bg:#F7F6F3;--surface:#FFFFFF;--surface-hover:#FAFAF8;--text-primary:#1A1714;--text-secondary:#6E6A62;--text-tertiary:#A09C94;--border:#E8E5DD;--border-light:#F0EDE6;--success:#1B7A3D;--success-bg:#E8F5EC;--warning:#B8860B;--warning-bg:#FEF6E0;--danger:#C0392B;--danger-bg:#FCEAE8;--info:#2874A6;--info-bg:#E8F1FA;--radius-sm:8px;--radius-md:12px;--shadow-xs:0 1px 2px rgba(0,0,0,0.04);--shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);--tr:0.2s cubic-bezier(0.4,0,0.2,1)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.5;overflow:hidden;height:100vh}.app{display:flex;height:100vh}
        .sidebar{width:var(--sidebar-w);background:var(--purple-900);display:flex;flex-direction:column;flex-shrink:0;z-index:50;overflow:hidden}
        .sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:14px;min-height:80px}
        .sidebar-brand .logo-mark{width:38px;height:38px;background:var(--gold-500);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:20px;color:var(--purple-900);flex-shrink:0}
        .sidebar-brand .brand-title{font-family:'Instrument Serif',serif;font-size:18px;color:#fff}.sidebar-brand .brand-subtitle{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.03em}
        .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}.sidebar-nav::-webkit-scrollbar{width:0}
        .nav-section-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.25);padding:16px 12px 8px;font-weight:600}
        .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);color:rgba(255,255,255,0.55);cursor:pointer;transition:all var(--tr);font-size:13.5px;margin-bottom:2px;user-select:none}
        .nav-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.85)}.nav-item.active{background:rgba(253,208,35,0.12);color:var(--gold-400)}.nav-item.active .nav-icon svg{stroke:var(--gold-400)}
        .nav-item .nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.nav-item .nav-icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none}
        .nav-item .nav-badge{margin-left:auto;font-size:11px;background:rgba(253,208,35,0.15);color:var(--gold-400);padding:1px 8px;border-radius:10px;font-weight:600}
        .nav-group-children{overflow:hidden;max-height:0;transition:max-height 0.3s ease}.nav-group.open .nav-group-children{max-height:300px}.nav-group-children .nav-item{padding-left:44px;font-size:13px}
        .nav-group-toggle .chevron{margin-left:auto;transition:transform 0.2s}.nav-group.open .nav-group-toggle .chevron{transform:rotate(90deg)}
        .sidebar-footer{padding:16px 16px 20px;border-top:1px solid rgba(255,255,255,0.06)}
        .sidebar-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--radius-sm);cursor:pointer}.sidebar-user:hover{background:rgba(255,255,255,0.06)}
        .sidebar-user .avatar{width:32px;height:32px;border-radius:8px;background:var(--purple-500);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;flex-shrink:0}
        .sidebar-user .user-name{font-size:13px;color:rgba(255,255,255,0.85);font-weight:500}.sidebar-user .user-role{font-size:11px;color:rgba(255,255,255,0.35)}
        .main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
        .top-header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;flex-shrink:0}
        .top-header .page-title{font-size:17px;font-weight:600;letter-spacing:-0.01em;margin-right:auto}
        .header-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;width:280px;transition:border-color var(--tr)}
        .header-search:focus-within{border-color:var(--purple-400);box-shadow:0 0 0 3px rgba(91,45,158,0.08)}
        .header-search svg{width:16px;height:16px;stroke:var(--text-tertiary);stroke-width:2;fill:none;flex-shrink:0}
        .header-search input{border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--text-primary);outline:none;width:100%}.header-search input::placeholder{color:var(--text-tertiary)}
        .header-actions{display:flex;align-items:center;gap:6px}
        .header-icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}.header-icon-btn:hover{background:var(--bg)}
        .header-icon-btn svg{width:18px;height:18px;stroke:var(--text-secondary);stroke-width:1.8;fill:none}
        .header-icon-btn .notif-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:1.5px solid var(--surface)}
        .header-avatar{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--purple-100);display:flex;align-items:center;justify-content:center;color:var(--purple-600);font-size:13px;font-weight:600;cursor:pointer;margin-left:4px}
        .header-divider{width:1px;height:24px;background:var(--border);margin:0 4px}
        .content-area{flex:1;overflow-y:auto;padding:28px}.content-area::-webkit-scrollbar{width:6px}.content-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        .file-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
        .file-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);background:var(--surface);border:1px solid var(--border);padding:5px 12px;border-radius:20px}
        .file-chip svg{width:14px;height:14px;stroke:var(--text-tertiary);stroke-width:2;fill:none}.file-chip.live{color:var(--success);border-color:#C3E6CB;background:var(--success-bg)}.file-chip.live svg{stroke:var(--success)}
        .refresh-btn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:500;color:var(--purple-600);background:var(--purple-50);border:1px solid var(--purple-100);padding:7px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--tr)}.refresh-btn:hover{background:var(--purple-100)}.refresh-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;box-shadow:var(--shadow-xs);transition:box-shadow var(--tr),transform var(--tr)}.stat-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
        .stat-card .stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .stat-card .stat-label{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-tertiary);font-weight:600}
        .stat-card .stat-icon{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}.stat-card .stat-icon svg{width:16px;height:16px;stroke-width:2;fill:none}
        .stat-card .stat-icon.purple{background:var(--purple-50)}.stat-card .stat-icon.purple svg{stroke:var(--purple-500)}
        .stat-card .stat-icon.gold{background:var(--gold-100)}.stat-card .stat-icon.gold svg{stroke:var(--gold-600)}
        .stat-card .stat-icon.green{background:var(--success-bg)}.stat-card .stat-icon.green svg{stroke:var(--success)}
        .stat-card .stat-icon.blue{background:var(--info-bg)}.stat-card .stat-icon.blue svg{stroke:var(--info)}
        .stat-card .stat-value{font-size:30px;font-weight:700;letter-spacing:-0.03em;line-height:1;margin-bottom:4px}.stat-card .stat-desc{font-size:12px;color:var(--text-tertiary)}
        .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
        .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:22px;box-shadow:var(--shadow-xs)}.chart-card.full-width{grid-column:1/-1}
        .chart-card .chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
        .chart-card h2{font-size:14px;font-weight:600;margin-bottom:2px}.chart-card .chart-subtitle{font-size:12px;color:var(--text-tertiary)}
        .chart-tag{font-size:11px;padding:3px 10px;border-radius:6px;font-weight:500;background:var(--bg);color:var(--text-secondary);border:1px solid var(--border-light)}
        .chart-wrap{position:relative;width:100%;height:260px}.chart-wrap canvas{width:100%!important;height:100%!important}
        .table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-xs);overflow:hidden}
        .table-header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light)}.table-header h2{font-size:14px;font-weight:600}.record-count{font-weight:400;color:var(--text-tertiary);margin-left:6px}
        .table-search-input{font-family:inherit;font-size:13px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-primary);width:200px;outline:none}.table-search-input:focus{border-color:var(--purple-400)}
        .table-scroll{max-height:400px;overflow-y:auto}.table-scroll::-webkit-scrollbar{width:5px}.table-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        table{width:100%;border-collapse:collapse;font-size:13px}thead th{text-align:left;padding:10px 16px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-tertiary);border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:2}
        tbody td{padding:10px 16px;border-bottom:1px solid var(--border-light);color:var(--text-secondary)}tbody tr:hover{background:var(--surface-hover)}
        .pill{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
        .pill.committed{background:var(--success-bg);color:var(--success)}.pill.withdrawn{background:var(--danger-bg);color:var(--danger)}.pill.pending{background:var(--warning-bg);color:var(--warning)}
        .pill.alumni{background:var(--purple-50);color:var(--purple-500)}.pill.pre-decision{background:var(--info-bg);color:var(--info)}.pill.post-decision{background:var(--gold-100);color:var(--gold-600)}
        .pill.received{background:var(--success-bg);color:var(--success)}.pill.not-received{background:var(--bg);color:var(--text-tertiary)}
        .loading-state{text-align:center;padding:80px 20px}.loading-state .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--purple-500);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
        @keyframes spin{to{transform:rotate(360deg)}}.loading-state p{color:var(--text-tertiary);font-size:14px}
        .demo-banner{background:var(--gold-100);border-bottom:1px solid var(--gold-300);color:var(--purple-800);text-align:center;padding:7px 16px;font-size:12px;font-weight:500;display:none}
        .page{animation:pageIn 0.25s ease}@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:1200px){.stats-row{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:900px){.sidebar{width:72px}.sidebar .brand-text,.sidebar .nav-label,.sidebar .nav-badge,.sidebar .nav-section-label,.sidebar .user-info,.sidebar .chevron{display:none}.sidebar-brand{justify-content:center;padding:24px 12px}.sidebar-nav .nav-item{justify-content:center;padding:10px}.sidebar-footer .sidebar-user{justify-content:center}.charts-grid{grid-template-columns:1fr}.header-search{width:180px}}
        @media(max-width:600px){.sidebar{display:none}.stats-row{grid-template-columns:1fr}.content-area{padding:16px}.header-search{display:none}}
    </style>
</head>
<body>
<div class="app">
<aside class="sidebar">
    <div class="sidebar-brand"><div class="logo-mark">LSU</div><div class="brand-text"><div class="brand-title">Study Abroad</div><div class="brand-subtitle">Advisor Dashboard</div></div></div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Analytics</div>
        <div class="nav-item active" onclick="nav('overview',this)"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span><span class="nav-label">Overview</span></div>
        <div class="nav-group open" id="metricsGroup">
            <div class="nav-item nav-group-toggle" onclick="document.getElementById('metricsGroup').classList.toggle('open')"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/><path d="M12 3v9l6.36 3.64"/></svg></span><span class="nav-label">Metrics</span><svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
            <div class="nav-group-children">
                <div class="nav-item" onclick="nav('metric1',this)"><span class="nav-label">Application Pipeline</span></div>
                <div class="nav-item" onclick="nav('metric2',this)"><span class="nav-label">Form Completion</span></div>
                <div class="nav-item" onclick="nav('metric3',this)"><span class="nav-label">Advising Funnel</span></div>
            </div>
        </div>
        <div class="nav-item" onclick="nav('programs',this)"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span><span class="nav-label">Programs</span></div>
        <div class="nav-section-label">Data</div>
        <div class="nav-item" onclick="nav('files',this)"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><span class="nav-label">File History</span></div>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-user"><div class="avatar">AG</div><div class="user-info"><div class="user-name">Amber Galjour</div><div class="user-role">SAO Advisor</div></div></div></div>
</aside>
<div class="main-area">
    <div class="demo-banner" id="demoBanner">Viewing sample data — connect Google Drive to see live reports</div>
    <header class="top-header">
        <span class="page-title" id="pageTitle">Overview</span>
        <div class="header-search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search students, programs..." id="globalSearch" oninput="handleGlobalSearch(this.value)"></div>
        <div class="header-actions"><button class="header-icon-btn"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot"></span></button><button class="header-icon-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button></div>
        <div class="header-divider"></div>
        <div class="header-avatar">AG</div>
    </header>
    <main class="content-area" id="contentArea"><div class="loading-state"><div class="spinner"></div><p>Loading dashboard...</p></div></main>
</div>
</div>
<script src="/static/dashboard.js"></script>
</body>
</html>
